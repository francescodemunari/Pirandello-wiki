name: pirandello_mobile
description: "Pirandello Chatbot + Wiki Manager — Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  provider: ^6.1.2
  socket_io_client: ^3.1.4
  http: ^1.6.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.6.0
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
